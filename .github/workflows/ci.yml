name: Production CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

jobs:
  backend-checks:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Automatically caches dependencies for faster runs

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 bandit

      - name: 🔒 Security Scan (Bandit)
        run: |
          # Scans Python code for common security vulnerabilities
          bandit -r server api -ll

      - name: 🧹 Lint (Flake8)
        run: |
          # Stop the build if there are critical syntax errors or undefined names
          flake8 server api --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat other formatting issues as warnings
          flake8 server api --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

      - name: 🧪 Run Tests & Coverage
        env:
          TOKEN_ENCRYPTION_KEY: "test_key_which_must_be_thirty_two_bytes_long_in_base64"
          SESSION_SECRET_KEY: "test_session"
          GITHUB_CLIENT_ID: "test"
          GITHUB_CLIENT_SECRET: "test"
          GOOGLE_CLIENT_ID: "test"
          GOOGLE_CLIENT_SECRET: "test"
        run: |
          # Run pytest. If no tests are found, it exits with 5, which we catch and ignore to keep the pipeline green.
          pytest --cov=server --cov-report=xml || ( [ $? -eq 5 ] && echo "No tests found. Skipping." || exit $? )

  frontend-checks:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Automatically caches node_modules

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Frontend
        run: npm run build
